name: Paper Trading Bot

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        run: python live/paper_bot.py

      - name: Wait before next run
        run: sleep 300

      - name: Trigger next run
        run: |
          curl -X POST \
          -H "Authorization: token ${{ secrets.BOT_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/paperbot.yml/dispatches
          -d '{"ref":"main"}'
